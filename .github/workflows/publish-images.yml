name: Publish docker container images

on:
  push:
    # Publish semver tags as releases.
    tags: [ 'v*.*.*' ]
  workflow_dispatch:

env:
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  REPOSITORY: ${{ github.repository }}
  # Could be updated to SemVer by first step
  VERSION: wip


jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        target: [toolchain, spike, qemu]

    steps:
      - name: Set SemVer tag
        if: startsWith(github.event.ref, 'refs/tags/v')
        run: echo "VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: true

      # Set up BuildKit Docker container builder to be able to build
      # multi-platform images and export cache
      # https://github.com/docker/setup-buildx-action
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226 # v3.0.0

      # Login against a Docker registry except on PR
      # https://github.com/docker/login-action
      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d # v3.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push Docker image with BuildKit
      # https://github.com/docker/build-push-action
      - name: Build and push Docker images
        uses: docker/build-push-action@v5
        with:
            tags: ${{ env.REGISTRY }}/${{ env.REPOSITORY }}/${{ matrix.target }}:${{ env.VERSION }}
            target: ${{ matrix.target }}
            push: true
